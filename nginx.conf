# BASIC config for nginx, CHANGE THIS UP! 
# place this at /etc/nginx/sites-available/scope
# then: ln -s /etc/nginx/sites-available/scope /etc/nginx/sites-enabled/scope

server {
    listen 80;
    server_name your-domain.com;

    # Redirect HTTP -> HTTPS once you have a cert (see certbot instructions in README)
    # For now this serves plain HTTP so you can verify things work before adding SSL.

    root /var/www/scope;

    # frontend
    location / {
        try_files /index.html =404;
    }

    # chats
    location /chats/ {
        try_files /index.html =404;
    }

    # images to be served directly
    location /uploads/ {
        alias /var/www/scope/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # API — proxy to the Flask app, i'm not sure if CORS implementation like this is the best way to do it but it works for now
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE — disable buffering so tokens stream through immediately
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 180s;

        # this is needed for SSE to work properly, otherwise nginx will buffer the response and not send it to the client until the connection is closed
        proxy_set_header   Connection '';
        chunked_transfer_encoding on;
    }
}
